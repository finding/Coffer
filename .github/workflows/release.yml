name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Get previous tag
        id: get_previous_tag
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          echo "PREVIOUS_TAG=$PREVIOUS_TAG" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          PREVIOUS_TAG="${{ steps.get_previous_tag.outputs.PREVIOUS_TAG }}"
          CURRENT_TAG="v${{ steps.get_version.outputs.VERSION }}"
          REPO="${{ github.repository }}"
          
          if [ -z "$PREVIOUS_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s" --reverse)
          else
            COMMITS=$(git log ${PREVIOUS_TAG}..HEAD --pretty=format:"- %s" --reverse)
          fi
          
          # Save commits to file for multiline output
          echo "COMMITS<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          # Extract issue numbers from commits
          ISSUES=$(echo "$COMMITS" | grep -oE '#[0-9]+' | sort -u || echo "")
          if [ -n "$ISSUES" ]; then
            ISSUES_LINKS=$(echo "$ISSUES" | sed "s/#\([0-9]*\)/- [#\1](https:\/\/github.com\/${REPO}\/issues\/\1)/")
            echo "ISSUES<<EOF" >> $GITHUB_OUTPUT
            echo "$ISSUES_LINKS" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "ISSUES=" >> $GITHUB_OUTPUT
          fi

      - name: Create ZIP archive
        run: |
          cd dist
          zip -r ../coffer-${{ steps.get_version.outputs.VERSION }}.zip .

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Coffer v${{ steps.get_version.outputs.VERSION }}
          body: |
            ## Coffer v${{ steps.get_version.outputs.VERSION }}
            
            ### 更新日志 / Changelog
            
            ${{ steps.changelog.outputs.COMMITS }}
            
            ${{ steps.changelog.outputs.ISSUES != '' && '### 相关 Issue / Related Issues' || '' }}
            ${{ steps.changelog.outputs.ISSUES }}
            
            ---
            
            ### 安装方法
            1. 下载 `coffer-${{ steps.get_version.outputs.VERSION }}.zip`
            2. 解压 ZIP 文件
            3. 打开 Chrome，访问 `chrome://extensions/`
            4. 在右上角启用"开发者模式"
            5. 点击"加载已解压的扩展程序"，选择解压后的文件夹
            
            ### Installation
            1. Download `coffer-${{ steps.get_version.outputs.VERSION }}.zip`
            2. Unzip the file
            3. Open Chrome and go to `chrome://extensions/`
            4. Enable "Developer mode" in the top right
            5. Click "Load unpacked" and select the unzipped folder
            
            ---
            
            ⚠️ **安全警告 / Security Warning**
            
            请勿将导出的 Cookie/Storage 数据分享给他人，这可能导致账号被盗。
            Do not share exported Cookie/Storage data with others - this may lead to account compromise.
            
          files: |
            coffer-${{ steps.get_version.outputs.VERSION }}.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
